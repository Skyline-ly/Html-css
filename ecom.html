<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<style>

    *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    }
.nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: Arial, sans-serif;
    background-color: #f8f8f8;
    padding: 15px;
}
.name {
    font-size: 24px;
    font-weight: bold;
    padding: 10px;
}
.middlenav {
    display: flex;
    gap: 20px;
}
.middlenav p {
    margin: 0;
    padding: 10px;
    cursor: pointer;
}
.rightnav {
    display: flex;
    gap: 15px;
    padding: 10px;
}
.icon-wrapper {
    position: relative;
    display: inline-block;
}
.tooltip {
    visibility: hidden;
    background-color: #333;
    color: #fff;
    text-align: center;
    padding: 5px 5px;
    border-radius: 4px;
    position: absolute;
    z-index: 1;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
}
.tooltip::after {
    content: "";
    position: absolute;
    top: 100%; 
    left: 50%;
    margin-left: -5px;
    border-width: 5px;
    border-style: solid;
    border-color: #333 transparent transparent transparent;
}
.icon-wrapper:hover .tooltip {
    visibility: visible;
    opacity: 1;
}

.rightnav i {
    font-size: 18px;
    cursor: pointer;
}

</style>
<body>
    <div class="nav">
        <div class="name">My E-commerce Store</div>
        <div class="middlenav">
            <p>Home</p>
            <p>Shop</p>
            <p>Products</p>
            <p>Page</p>
            <p>Blog</p>
            <p>Bye Now</p> 
        </div>
    <div class="rightnav">
    <div class="icon-wrapper">
        <i class="fa fa-search"></i>
        <span class="tooltip">Search</span>
    </div>
    <div class="icon-wrapper">
        <i class="fa fa-user"></i>
        <span class="tooltip">User Account</span>
    </div>
    <div class="icon-wrapper">
        <i class="fa fa-heart"></i>
        <span class="tooltip">Wishlist</span>
    </div>
    <div class="icon-wrapper">
        <i class="fa fa-shopping-bag"></i>
        <span class="tooltip">Shopping Cart</span>
    </div>
</div>
<script>
    // 示例：为所有图标添加工具提示事件
document.querySelectorAll('.icon-wrapper').forEach(wrapper => {
    const tooltip = wrapper.querySelector('.tooltip');
    wrapper.addEventListener('mouseenter', () => {
        tooltip.style.visibility = 'visible';
        tooltip.style.opacity = '1';
    });
    wrapper.addEventListener('mouseleave', () => {
        tooltip.style.visibility = 'hidden';
        tooltip.style.opacity = '0';
    });
});

</script>

</body>
</html>
