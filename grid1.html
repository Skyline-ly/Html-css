<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

   body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    
}

.main {
    display: grid;
    width: 600px;
    height: 500px;
    grid-template-columns: 200px 200px 200px; 
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
}

.left {
    background-color: green;
    grid-row: 1 / span 3; 
}

.middel {
    display: grid;
    grid-template-rows: 1fr 2fr; 
    gap: 10px;
}

.item1 {
    background-color: green;
}

.middle2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
}

.item2 { background-color: orange; }
.item3 { background-color: red; }
.item4 { background-color: red; }
.item5 { background-color: orange; }

.right {
    display: grid;
    grid-template-rows: repeat(2, 1fr);
    gap: 10px;
}

.item6 { background-color: red; }
.item7 { background-color: green; }
</style>
<body>

    <div class="main">
        <div class="left">Left</div>
    <div class="middel">
        <div class="item1">item1</div>
        <div class="middle2">
            <div class="item2">item2</div>
        <div class="item3">item3</div>
        <div class="item4">item4</div>
        <div class="item5">item5</div>  
        </div>
        
    </div>
    <div class="right">
        <div class="item6">item6</div>
        <div class="item7">item7</div>
       
    </div>
    </div>
    
</body>
</html>
