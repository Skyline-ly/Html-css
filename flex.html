<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
       text-align: center;
       border-radius: 4px;
     
    }
    .main{
        width:40%;
        height:300px;
        display:flex;
        flex-direction: column;
        gap: 10px;
        margin: 10% auto;
        padding: 20px;
       
        
    }
    .header{
        background-color: red;
        width: 100%;
        height: 100px;
       
    }  

    .navigation{
        background-color: green;
        width: 100%;
        height: 100px;
    }
    .footer{
        background-color: blue;
        width: 100%;
        height: 100px;
        
        
    }
    .content{
        display: flex;
        flex-direction: row;
        width: 100%;
        height: 100%;
    }
    .aside{
        background-color: rgb(129, 129, 123);
        width: 300px;
        height: 100%;
    }
    .content{
       gap: 10px;
        width: 100%;
        height: 100%;
    }
   
    .section2{
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        gap: 10px;
    }
    .section{
        background-color: rgb(170, 170, 61);
        width: 100%;
        height: 50%;
    }
    .content2{
        background-color: rgb(170, 61, 170);
        width: 100%;
        height: 50%;
        
    }
</style>
  
<body>

    <div class="main">
        <div class="header">Header</div>
        <div class="navigation">Navigation</div>

        <div class="content">
            <div class="aside">Aside</div>
            <div class="section2">
                <div class="content2"> Content</div>
                <div class="section">Section</div>
            </div>         
        </div>
        <div class="footer">Footer</div>
    </div>
    
</body>
</html>
