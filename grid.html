<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    .item{
        background-color: #ccc;
        padding:15px;
        color:whitesmoke;
        text-align: center;
    }
    .container{
        display: grid;
        /*   this is the short cut for --->grid-template-columns: repeat(4, 1fr); */ 
        grid-template-columns: auto  100px 0.5fr;
        row-gap: 100px;


        
        gap: 10px;
    }
</style>
<body>
    <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
        <div class="item">6</div>
    </div>
    
</body>
</html>
